test:
  name: coc-query-mix
  description: Mix query ReadReperto / RepertoExists / OttieniStoriaReperto — curva completa 5–400 tps (60s per round, 4 worker)
  workers:
    type: local
    number: 4
  rounds:
    - label: querymix-05tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workloads/queryMix.js
        arguments:
          contractId: reperto
          repertoId: REP-BENCH-CALIPER
    - label: querymix-10tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
