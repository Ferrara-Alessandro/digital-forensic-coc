test:
  name: coc-query-mix
  description: Mix query ReadReperto / RepertoExists / OttieniStoriaReperto — 3 livelli TPS
  workers:
    type: local
    number: 4
  rounds:
    - label: querymix-10tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
        module: workloads/queryMix.js
        arguments:
          contractId: reperto
          repertoId: REP-BENCH-CALIPER
    - label: querymix-25tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 25
      workload:
        module: workloads/queryMix.js
        arguments:
          contractId: reperto
          repertoId: REP-BENCH-CALIPER
    - label: querymix-50tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 50
      workload:
        module: workloads/queryMix.js
        arguments:
          contractId: reperto
          repertoId: REP-BENCH-CALIPER

monitor:
  interval: 1
  type:
    - process
  process:
    - metric: cpu
    - metric: memory
