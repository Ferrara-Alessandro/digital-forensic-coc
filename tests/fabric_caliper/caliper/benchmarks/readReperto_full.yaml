test:
  name: coc-read-reperto-full
  description: Query ReadReperto — curva completa 5–400 tps (60s per round, 4 worker)
  workers:
    type: local
    number: 4
  rounds:
    - label: read-05tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 5
      workload:
        module: workloads/readReperto.js
        arguments:
          contractId: reperto
          repertoId: REP-BENCH-CALIPER
    - label: read-10tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 10
      workload:
