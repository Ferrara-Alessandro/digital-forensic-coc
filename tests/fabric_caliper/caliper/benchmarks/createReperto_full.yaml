test:
  name: coc-create-reperto-full
  description: Invoke CreaReperto (PG+PM) — curva completa 0,5–400 tps (11 round, 60s ciascuno, 4 worker, ID univoci)
  workers:
    type: local
    number: 4
  rounds:
    - label: create-0.5tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 0.5
      workload:
        module: workloads/createReperto_sat.js
        arguments:
          contractId: reperto
    - label: create-1tps-60s
      txDuration: 60
      rateControl:
        type: fixed-rate
        opts:
          tps: 1
      workload:
        module: workloads/createReperto_sat.js
        arguments:
          contractId: reperto
