# File di input per cryptogen: creo le organizzazioni PG, PM, LAB e l'orderer.
OrdererOrgs:
  - Name: Orderer
    Domain: example.com
    Specs:
      - Hostname: orderer

PeerOrgs:
  - Name: PGOrg
    Domain: pg.it
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 0

  - Name: PMOrg
    Domain: pm.it
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 0

  - Name: LABOrg
    Domain: lab.it
    EnableNodeOUs: true
    Template:
      Count: 1
    Users:
      Count: 0
